<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free AI Hub</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:20px;
background:#0a0a0a;
color:#eee;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#00ff9d;
}

.controls{

background:#1f1f1f;
padding:15px;
border-radius:12px;
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;

}


select,input{

padding:10px;
background:#222;
color:white;
border:none;
border-radius:8px;

}


.messages{

background:#171717;
padding:20px;
border-radius:12px;
min-height:60vh;
overflow:auto;

}


.message{

padding:14px;
margin:10px 0;
border-radius:12px;
line-height:1.5;

}


.user{

background:#007bff;
margin-left:15%;

}


.ai{

background:#333;

}


.input-area{

display:flex;
gap:10px;
margin-top:15px;

}


#main-input{

flex:1;
font-size:16px;

}


button{

background:#00cc77;
color:white;
border:none;
border-radius:12px;
padding:0 25px;
cursor:pointer;

}


button:hover{

background:#00ff9d;
color:black;

}


</style>

</head>


<body>


<div class="container">


<h1>🤖 Free AI Hub</h1>


<div class="controls">


<select id="model">

<option value="groq">
⚡ Groq Llama 3.3
</option>


<option value="gemini">
✨ Gemini API
</option>


<option value="deepseek" selected>
🧠 DeepSeek V3 Free
</option>


<option value="qwen">
🐼 Qwen3 Free
</option>


<option value="openrouter-gemini">
🌟 Gemini 2.5 Flash Free
</option>


</select>



<input 
id="groq-key"
placeholder="Groq API Key">


<input 
id="gemini-key"
placeholder="Gemini API Key">


<input 
id="openrouter-key"
placeholder="OpenRouter API Key">


</div>




<div id="messages" class="messages"></div>




<div class="input-area">


<input 
id="main-input"
placeholder="พิมพ์ข้อความ..."
onkeypress="if(event.key==='Enter') sendMessage()">


<button onclick="sendMessage()">
ส่ง
</button>


</div>


</div>




<script>


// โหลด Key


function loadKeys(){

groq-key.value =
localStorage.getItem("groq_key") || "";


gemini-key.value =
localStorage.getItem("gemini_key") || "";


openrouter-key.value =
localStorage.getItem("openrouter_key") || "";

}


function saveKeys(){

localStorage.setItem(
"groq_key",
groq-key.value.trim()
);


localStorage.setItem(
"gemini_key",
gemini-key.value.trim()
);


localStorage.setItem(
"openrouter_key",
openrouter-key.value.trim()
);


}


loadKeys();





async function sendMessage(){


let input =
document.getElementById("main-input");


let text=input.value.trim();


if(!text)return;


let box =
document.getElementById("messages");



box.innerHTML +=
`
<div class="message user">
${text}
</div>
`;



input.value="";



let id="load"+Date.now();


box.innerHTML +=
`
<div class="message ai" id="${id}">
กำลังคิด...
</div>
`;



let model =
document.getElementById("model").value;



let answer="";



try{


if(model==="groq"){

answer=
await callGroq(text);

}



else if(model==="gemini"){

answer=
await callGemini(text);

}



else if(model==="deepseek"){


answer=
await callOpenRouter(
text,
"deepseek/deepseek-chat-v3:free"
);


}



else if(model==="qwen"){


answer=
await callOpenRouter(
text,
"qwen/qwen3:free"
);


}



else{


answer=
await callOpenRouter(
text,
"google/gemini-2.5-flash:free"
);


}



}

catch(e){

answer="❌ "+e.message;

}



document.getElementById(id)
.innerHTML=answer;


saveKeys();


}





// GROQ


async function callGroq(text){


let key=
groq-key.value.trim();


if(!key)
key=prompt("Groq API Key");


let res=
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{


method:"POST",


headers:{

Authorization:`Bearer ${key}`,
"Content-Type":"application/json"

},


body:JSON.stringify({

model:"llama3-70b-8192",

messages:[
{
role:"user",
content:text
}

]

})


});


let data=await res.json();


return data.choices[0].message.content;


}







// GEMINI


async function callGemini(text){


let key=
gemini-key.value.trim();


if(!key)
key=prompt("Gemini API Key");



let res=
await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,

{


method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

contents:[

{
parts:[
{
text:text
}
]

}

]


})


}


);



let data=await res.json();



return data.candidates[0]
.content.parts[0].text;


}








// OPENROUTER


async function callOpenRouter(text,model){



let key=
openrouter-key.value.trim();



if(!key)
key=prompt("OpenRouter API Key");




let res=
await fetch(

"https://openrouter.ai/api/v1/chat/completions",

{


method:"POST",


headers:{


Authorization:
`Bearer ${key}`,


"Content-Type":
"application/json",


"HTTP-Referer":
window.location.href


},



body:JSON.stringify({


model:model,


messages:[

{

role:"user",

content:text

}

]


})



}


);



let data=
await res.json();



if(data.error)

throw new Error(
data.error.message
);



return data.choices[0]
.message.content;



}



</script>



</body>

</html>
