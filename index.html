<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClearView - Professional PDF Experience</title>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts: Anuphan (Modern Thai Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #84cc16;
            --bg: #f8fafc;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth; /* ทำให้เลื่อนหน้าแบบนุ่มนวล */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Anuphan', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .logo {
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        .logo span {
            color: var(--accent);
        }

        #pdf-viewer {
            padding-top: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* เลเยอร์สำหรับตรวจจับการแตะซ้าย-ขวา */
        .tap-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 20;
        }

        .tap-left {
            flex: 1;
            /* background: rgba(255,0,0,0.1); // เปิดเพื่อ debug */
        }

        .tap-right {
            flex: 1;
            /* background: rgba(0,255,0,0.1); // เปิดเพื่อ debug */
        }

        .save-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none; /* ปิด pointer-events เพื่อไม่ให้ขวาง tap-zone แต่ยังเก็บเมนูกดค้างได้ในบางเครื่อง */
            z-index: 10;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(132, 204, 22, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .page-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            pointer-events: none;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
            background-color: white;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CLEAR<span>VIEW</span></div>
</header>

<div id="loader">
    <div class="spinner"></div>
    <div style="color: var(--primary); font-size: 14px;">กำลังโหลดเอกสาร...</div>
</div>

<div id="pdf-viewer"></div>

<div class="page-indicator" id="page-indicator">หน้า 1 / -</div>

<footer>
    <div class="copyright">
        © 2026 ClearView. All rights reserved.
    </div>
</footer>

<script>
    const url = 'pdfs/01.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const viewer = document.getElementById('pdf-viewer');
    const loader = document.getElementById('loader');
    const pageIndicator = document.getElementById('page-indicator');

    let pdfDoc = null;
    let totalPages = 0;

    async function loadPDF() {
        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            totalPages = pdfDoc.numPages;
            loader.style.display = 'none';
            pageIndicator.innerText = `หน้า 1 / ${totalPages}`;

            const dpr = window.devicePixelRatio || 1;

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                
                const container = document.createElement('div');
                container.className = 'page-container';
                container.id = 'page-' + pageNum;
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                const baseScale = 2.5;
                const viewport = page.getViewport({ scale: baseScale });

                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                context.scale(dpr, dpr);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                container.appendChild(canvas);

                // สร้าง Tap Zones สำหรับคลิกเลื่อนหน้า
                const tapZone = document.createElement('div');
                tapZone.className = 'tap-zone';
                
                const tapLeft = document.createElement('div');
                tapLeft.className = 'tap-left';
                tapLeft.onclick = (e) => {
                    e.stopPropagation();
                    scrollToPage(pageNum - 1);
                };

                const tapRight = document.createElement('div');
                tapRight.className = 'tap-right';
                tapRight.onclick = (e) => {
                    e.stopPropagation();
                    scrollToPage(pageNum + 1);
                };

                tapZone.appendChild(tapLeft);
                tapZone.appendChild(tapRight);
                container.appendChild(tapZone);

                // ภาพสำหรับเซฟ (ใส่ไว้ล่าง tapZone เพื่อไม่ให้ขวางคลิก)
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.className = 'save-layer';
                container.appendChild(img);

                viewer.appendChild(container);
            }
        } catch (error) {
            loader.innerHTML = `<div style="color:red; padding: 20px;">⚠️ ไม่สามารถโหลดไฟล์ได้</div>`;
        }
    }

    function scrollToPage(targetPage) {
        if (targetPage < 1 || targetPage > totalPages) return;
        const targetElement = document.getElementById('page-' + targetPage);
        if (targetElement) {
            const offset = 70; // เผื่อระยะ header
            const elementPosition = targetElement.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - offset;

            window.scrollTo({
                top: offsetPosition,
                behavior: 'smooth'
            });
        }
    }

    window.addEventListener('scroll', () => {
        const containers = document.querySelectorAll('.page-container');
        let currentPage = 1;
        
        containers.forEach(container => {
            const rect = container.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                currentPage = container.id.split('-')[1];
            }
        });
        
        if (pdfDoc) {
            pageIndicator.innerText = `หน้า ${currentPage} / ${totalPages}`;
        }
    });

    loadPDF();
</script>

</body>
</html>
