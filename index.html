<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite AI Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #0e0e10; color: #e4e4e7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .container { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; }
        .header-panel { background: #18181b; padding: 12px; border-bottom: 1px solid #27272a; text-align: center; }
        h1 { font-size: 18px; color: #00ff99; margin: 0 0 8px 0; }
        .control-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #27272a; background: #27272a; color: white; font-size: 13px; }
        button { padding: 8px 12px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: #27272a; color: white; }
        .btn-check { background: #00cc77; }
        .btn-clear { background: #ef4444; }
        .attachment-badge { background: #1e1b4b; color: #00ff99; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin: 6px auto 0 auto; width: fit-content; }
        .messages { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding-bottom: 80px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; font-size: 14px; }
        .user { background: #2563eb; color: white; align-self: flex-end; }
        .ai { background: #18181b; align-self: flex-start; border: 1px solid #27272a; width: 100%; }
        .model-tag { font-size: 11px; color: #00ff99; font-weight: bold; }
        .chat-img-preview { max-width: 150px; max-height: 150px; border-radius: 6px; display: block; margin-bottom: 4px; }
        .input-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #18181b; padding: 12px; border-top: 1px solid #27272a; display: flex; gap: 8px; max-width: 800px; margin: 0 auto; }
        .input-panel input { flex-grow: 1; }
        .btn-send { background: #00cc77; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-panel">
            <h1>🤖 Lite AI Hub</h1>
            <div class="control-row">
                <select id="model">
                    <option value="gemini-direct">Gemini 2.5 Flash (ตรง)</option>
                    <option value="openrouter/free">Auto Free (OpenRouter)</option>
                </select>
                <input id="key" type="password" placeholder="API Key">
                <button onclick="saveKey()" class="btn-check">จำ Key</button>
                <button onclick="clearMemory()" class="btn-clear">ล้างแชท</button>
            </div>
            <div id="attachment-area"></div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-panel">
            <button onclick="triggerFile()" style="background:#3f3f46;">📎</button>
            <input type="file" id="uploader" accept="image/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" style="display:none;" onchange="handleFile(event)">
            <input id="text" placeholder="พิมพ์ข้อความ หรือแนบไฟล์รูป/PDF/Word..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="btn-send">ส่ง</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        marked.setOptions({ breaks: true, highlight: (c, l) => hljs.highlight(l ? l : 'plaintext', c).value });

        let chatHistory = [], geminiHistory = [], currentFile = null;
        const SYSTEM_INSTRUCTION = "คุณคือผู้ช่วยภาษาไทยที่ฉลาด ตอบตรงประเด็น กระชับ ไม่เยิ่นเย้อ ประหยัดคำพูดและโทเค็น";

        function loadKey() {
            const m = document.getElementById("model").value;
            document.getElementById("key").value = localStorage.getItem(m === "gemini-direct" ? "g_key" : "or_key") || "";
        }
        function saveKey() {
            const m = document.getElementById("model").value;
            localStorage.setItem(m === "gemini-direct" ? "g_key" : "or_key", document.getElementById("key").value.trim());
            alert("บันทึกคีย์แล้ว");
        }
        document.getElementById("model").addEventListener("change", loadKey);
        loadKey();

        function clearMemory() {
            chatHistory = []; geminiHistory = []; currentFile = null;
            document.getElementById("messages").innerHTML = ""; document.getElementById("attachment-area").innerHTML = "";
        }

        function triggerFile() { document.getElementById("uploader").click(); }

        async function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            currentFile = { name: file.name, type: file.type, textData: "", base64Data: "" };
            const area = document.getElementById("attachment-area");

            if (file.type.startsWith("image/")) {
                const r = new FileReader();
                r.onload = () => { currentFile.base64Data = r.result.split(",")[1]; area.innerHTML = `<div class="attachment-badge">🖼️ ${file.name}</div>`; };
                r.readAsDataURL(file);
            } else if (file.name.endsWith(".docx")) {
                const r = new FileReader();
                r.onload = () => { mammoth.extractRawText({ arrayBuffer: r.result }).then(res => { currentFile.textData = res.value; area.innerHTML = `<div class="attachment-badge">📝 Word Loaded</div>`; }); };
                r.readAsArrayBuffer(file);
            } else if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
                const r = new FileReader();
                r.onload = async () => {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(r.result)).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const txt = await page.getTextContent();
                        currentFile.textData += txt.items.map(item => item.str).join(" ") + "\n";
                    }
                    area.innerHTML = `<div class="attachment-badge">📕 PDF Loaded (${pdf.numPages} หน้า)</div>`;
                };
                r.readAsArrayBuffer(file);
            } else {
                const r = new FileReader();
                r.onload = () => { currentFile.textData = r.result; area.innerHTML = `<div class="attachment-badge">📄 Text Loaded</div>`; };
                r.readAsText(file);
            }
            e.target.value = "";
        }

        async function send() {
            let txt = document.getElementById("text").value.trim();
            if (!txt && !currentFile) return;

            const box = document.getElementById("messages");
            let html = `<div class="msg user">`;
            if (currentFile && currentFile.type.startsWith("image/")) html += `<img class="chat-img-preview" src="data:${currentFile.type};base64,${currentFile.base64Data}">`;
            html += `${txt || "วิเคราะห์ไฟล์นี้"}</div>`;
            box.innerHTML += html;
            document.getElementById("text").value = "";

            await executeRequest(txt, currentFile);
            currentFile = null; document.getElementById("attachment-area").innerHTML = "";
        }

        async function executeRequest(promptText, fileObj) {
            const box = document.getElementById("messages");
            const loading = document.createElement("div"); loading.className = "msg ai"; loading.innerHTML = "...";
            box.appendChild(loading); box.scrollTop = box.scrollHeight;

            try {
                const m = document.getElementById("model").value;
                let res;
                if (m === "gemini-direct") {
                    res = await fetchGemini(promptText, fileObj);
                } else {
                    let p = promptText;
                    if (fileObj && fileObj.textData) p += `\n\n[File: ${fileObj.name}]\n${fileObj.textData}`;
                    res = await fetchOpenRouter(p, m);
                }
                loading.innerHTML = `<span class="model-tag">🤖 ${res.model}</span><br><div>${marked.parse(res.answer)}</div>`;
                loading.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } catch (e) { loading.innerHTML = "❌ Error: " + e.message; }
            box.scrollTop = box.scrollHeight;
        }

        async function fetchGemini(promptText, fileObj) {
            let key = localStorage.getItem("g_key") || ""; if (!key) throw new Error("ขาดคีย์ Gemini");
            let parts = [];
            if (fileObj && fileObj.base64Data) {
                parts.push({ inlineData: { mimeType: fileObj.type, data: fileObj.base64Data } });
                parts.push({ text: promptText || "อธิบายภาพนี้" });
            } else if (fileObj && fileObj.textData) {
                parts.push({ text: `${promptText || "สรุปไฟล์นี้"}\n\n[File: ${fileObj.name}]\n${fileObj.textData}` });
            } else { parts.push({ text: promptText }); }

            geminiHistory.push({ role: "user", parts });
            if (geminiHistory.length > 10) geminiHistory.shift();

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: geminiHistory, systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] }, generationConfig: { temperature: 0.3 } })
            });
            if (!res.ok) throw new Error("API มีปัญหา");
            const data = await res.json();
            let ans = data.candidates[0].content.parts[0].text;
            geminiHistory.push({ role: "model", parts: [{ text: ans }] });
            return { answer: ans, model: "Gemini 2.5 Flash" };
        }

        async function fetchOpenRouter(text, modelId) {
            let key = localStorage.getItem("or_key") || ""; if (!key) throw new Error("ขาดคีย์ OpenRouter");
            chatHistory.push({ role: "user", content: text });
            if (chatHistory.length > 10) chatHistory.shift();

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: modelId, messages: [{ role: "system", content: SYSTEM_INSTRUCTION }, ...chatHistory], temperature: 0.3 })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            let ans = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: ans });
            return { answer: ans, model: data.model };
        }
    </script>
</body>
</html>
