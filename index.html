<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearView - Smooth PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f8fafc;
}

#pdf-viewer{
    padding-top:60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.page{
    width:100%;
    max-width:900px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

canvas{
    width:100%;
    height:auto;
    display:block;
}
</style>
</head>

<body>

<div id="pdf-viewer"></div>

<script>
const url = 'pdfs/01.pdf';

const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const viewer = document.getElementById('pdf-viewer');

let pdfDoc = null;

// จำกัด performance
const MAX_DPR = 2;
const SCALE = 1.5;

// เก็บหน้าที่ render แล้ว
const renderedPages = new Set();

async function renderPage(pageNum){
    if(renderedPages.has(pageNum)) return;

    const page = await pdfDoc.getPage(pageNum);

    const container = document.getElementById('page-'+pageNum);
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');

    const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    const viewport = page.getViewport({ scale: SCALE });

    canvas.width = viewport.width * dpr;
    canvas.height = viewport.height * dpr;

    context.scale(dpr, dpr);

    await page.render({
        canvasContext: context,
        viewport: viewport
    }).promise;

    container.innerHTML = '';
    container.appendChild(canvas);

    renderedPages.add(pageNum);
}

// Lazy Load ด้วย IntersectionObserver
function setupLazyLoad(){
    const observer = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
            if(entry.isIntersecting){
                const pageNum = parseInt(entry.target.dataset.page);
                renderPage(pageNum);
            }
        });
    },{
        rootMargin: '200px' // โหลดล่วงหน้า
    });

    document.querySelectorAll('.page').forEach(el=>{
        observer.observe(el);
    });
}

async function init(){
    pdfDoc = await pdfjsLib.getDocument(url).promise;

    const totalPages = pdfDoc.numPages;

    // สร้าง placeholder ก่อน (เบามาก)
    for(let i=1;i<=totalPages;i++){
        const div = document.createElement('div');
        div.className = 'page';
        div.id = 'page-'+i;
        div.dataset.page = i;

        // skeleton loading
        div.innerHTML = `
            <div style="
                height:500px;
                display:flex;
                align-items:center;
                justify-content:center;
                color:#999;
            ">
                Loading page ${i}...
            </div>
        `;

        viewer.appendChild(div);
    }

    setupLazyLoad();
}

init();
</script>

</body>
</html>
