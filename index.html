<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Free AI Hub (Markdown & Code Highlight Pro)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: white; padding: 20px; margin: 0; }
        .container { max-width: 950px; margin: auto; padding: 10px; }
        h1 { text-align: center; color: #00ff99; font-size: 24px; }
        .panel { background: #1d1d1d; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2a2a2a; }
        select, input, button { padding: 12px; border-radius: 10px; border: none; margin: 5px; font-size: 14px; }
        input, select { background: #333; color: white; box-sizing: border-box; }
        button { background: #00cc77; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #00ff88; }
        .messages { background: #151515; min-height: 500px; max-height: 70vh; padding: 20px; border-radius: 15px; overflow-y: auto; border: 1px solid #222; }
        .msg { padding: 14px; margin: 12px 0; border-radius: 12px; line-height: 1.6; word-wrap: break-word; }
        .user { background: #0066ff; margin-left: 15%; border-bottom-right-radius: 2px; }
        .ai { background: #232323; margin-right: 15%; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .model-tag { font-size: 11px; color: #00ff99; background: #111; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-weight: bold; border: 1px solid #333; }
        .copy-btn { background: #3a3a3a; padding: 6px 12px; font-size: 12px; margin-top: -5px; margin-bottom: 8px; color: #00ff99; border-radius: 6px; cursor: pointer; display: block; float: right; border: 1px solid #444; }
        .copy-btn:hover { background: #444; }
        .clear-btn { background: #ff3333; float: right; }
        .clear-btn:hover { background: #ff5555; }
        
        /* 🎨 จัดตกแต่งส่วน Markdown คอนเทนต์ภายในแชท */
        .ai pre { background: #1e1e1e !important; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid #2d2d2d; position: relative; }
        .ai code { font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 2px 6px; background: #1e1e1e; border-radius: 4px; color: #ff79c6; }
        .ai pre code { padding: 0; background: transparent; color: inherit; display: block; }
        .ai p { margin: 6px 0; }
        .ai ul, .ai ol { margin: 6px 0; padding-left: 20px; }
        .ai table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
        .ai th, .ai td { border: 1px solid #444; padding: 8px; text-align: left; }
        .ai th { background: #2b2b2b; color: #00ff99; }
        .clearfix { clear: both; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Safe Free AI Hub (Markdown Pro)</h1>

        <div class="panel">
            <select id="model" style="width: 100%; max-width: 400px;">
                <option value="openrouter/free">🚀 Auto Free (แนะนำที่สุด - ระบบสลับตัวที่ว่างให้ฟรีอัตโนมัติ)</option>
                <option value="meta-llama/llama-3.2-3b-instruct:free">🦙 Llama 3.2 Free (รุ่นเสถียร คุยลื่นไหล)</option>
            </select>
            <span id="current-model" style="margin-left:10px; color:#00ff99; display: inline-block; margin-top: 5px;"></span>
            
            <br><br>
            <input id="key" placeholder="OpenRouter API Key" style="width:65%">
            <button onclick="checkKey()">🔍 เช็ก Key</button>
            <button onclick="clearMemory()" class="clear-btn">🧹 ล้างความจำ</button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="panel" style="display: flex;">
            <input id="text" placeholder="พิมพ์ข้อความคุยกับ AI..." 
                   style="flex-grow: 1;" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="width: 80px;">ส่ง</button>
        </div>
    </div>

    <script>
        // ⚙️ คอนฟิกตัวแปลงสคริปต์ระบุวิธีแปลผล Markdown
        marked.setOptions({
            breaks: true, // ตรวจจับการกดขึ้นบรรทัดใหม่อัตโนมัติ
            highlight: function(code, lang) {
                // ค้นหาภาษาของโค้ดเพื่อแมตช์สีให้เหมาะสม ถ้าไม่เจอก็ให้รันแบบสุ่มจัดกลุ่มคำทั่วไป
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        const keyInput = document.getElementById("key");
        keyInput.value = localStorage.getItem("or_key") || "";

        let chatHistory = [];

        function saveKey() {
            localStorage.setItem("or_key", keyInput.value.trim());
        }

        function updateCurrentModel() {
            const modelSelect = document.getElementById("model");
            const display = document.getElementById("current-model");
            let name = modelSelect.options[modelSelect.selectedIndex].text;
            display.textContent = "กำลังใช้: " + name;
        }
        document.getElementById("model").addEventListener("change", updateCurrentModel);
        updateCurrentModel();

        function clearMemory() {
            chatHistory = [];
            document.getElementById("messages").innerHTML = "";
            alert("ล้างความจำเรียบร้อยแล้ว!");
        }

        async function checkKey() {
            saveKey();
            let key = keyInput.value.trim();
            if (!key) return alert("ใส่ Key ก่อน");
            alert("Key ถูกบันทึกแล้ว");
        }

        async function send() {
            let text = document.getElementById("text").value.trim();
            if (!text) return;

            const box = document.getElementById("messages");
            box.innerHTML += `<div class="msg user">${text}</div>`;
            document.getElementById("text").value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.innerHTML = "กำลังคิด...";
            box.appendChild(loading);
            box.scrollTop = box.scrollHeight;

            try {
                const result = await callAIWithFallback(text);
                
                // 🔄 เปลี่ยนแปลงสำคัญ: ใช้ marked.parse() แปลง Markdown ดิบให้กลายเป็นโค้ดและตาราง HTML ที่จัดหน้าสวยงาม
                let htmlResponse = `<div class="model-tag">🤖 Responded by: ${result.modelName}</div><br>`;
                htmlResponse += `<div class="markdown-body">${marked.parse(result.answer)}</div>`;
                
                loading.innerHTML = htmlResponse;
                
                // สั่งระบบ Highlight โค้ดที่เพิ่งเจนขึ้นมาใหม่ และแปะปุ่มก๊อปปี้โค้ด
                loading.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                addCopyButtons(loading);   
            } catch (e) {
                loading.innerHTML = "❌ " + e.message;
            }
            box.scrollTop = box.scrollHeight;
        }

        function addCopyButtons(element) {
            const codeBlocks = element.querySelectorAll("pre");
            codeBlocks.forEach(block => {
                // ตรวจเช็คเพื่อไม่ให้สร้างปุ่มเบิ้ลซ้ำซ้อน
                if (block.querySelector('.copy-btn')) return;

                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.textContent = "📋 ก๊อปปี้โค้ด";
                btn.onclick = () => {
                    const targetCode = block.querySelector('code') ? block.querySelector('code').textContent : block.textContent;
                    navigator.clipboard.writeText(targetCode);
                    btn.textContent = "✅ ก๊อปแล้ว!";
                    setTimeout(() => btn.textContent = "📋 ก๊อปปี้โค้ด", 2000);
                };
                // แปะปุ่มไว้ด้านบนสุดของบล็อกโค้ด
                block.insertBefore(btn, block.firstChild);
            });
        }

        async function callAIWithFallback(text) {
            const selectedModel = document.getElementById("model").value;
            try {
                return await fetchFromOpenRouter(text, selectedModel);
            } catch (error) {
                console.warn(`โมเดล ${selectedModel} มีปัญหา: ${error.message} -> กำลังเปิดระบบกู้ภัยด้วย Auto Free...`);
                if (selectedModel !== "openrouter/free") {
                    return await fetchFromOpenRouter(text, "openrouter/free");
                } else {
                    throw error;
                }
            }
        }

        async function fetchFromOpenRouter(text, modelId) {
            let key = keyInput.value.trim();
            saveKey();
            if (!key) throw new Error("ยังไม่ได้ใส่ OpenRouter API Key");

            if (modelId !== "openrouter/free" && !modelId.endsWith(":free") && !modelId.includes(":free-")) {
                throw new Error("ระบบบล็อกเพื่อความปลอดภัย (ไม่ใช่โมเดลเวอร์ชันฟรี)");
            }

            // 🧠 การจัดการความจำแบบเป็นคู่ชวนคุย (ลบทั้งแผง User + Assistant พร้อมกันป้องกันคุยสลับ)
            let tempHistory = [...chatHistory, { role: "user", content: text }];
            while (tempHistory.length > 16) {
                tempHistory.shift(); 
            }

            let body = {
                model: modelId,
                temperature: 0.7,
                messages: [
                    { 
                        role: "system", 
                        content: "คุณคือผู้ช่วยภาษาไทยที่เป็นมิตร ฉลาด เป็นธรรมชาติ ไม่สุภาพเกินไป ตอบตรงประเด็นและมีประโยชน์" 
                    },
                    ...tempHistory
                ]
            };

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            let aiAnswer = data.choices[0].message.content;
            
            // อัปเดตเก็บประวัติการคุยเข้าสู่ฐานข้อมูลประวัติหลักแบบคู่สมบูรณ์
            chatHistory.push({ role: "user", content: text });
            chatHistory.push({ role: "assistant", content: aiAnswer });
            
            // ตรวจสอบความยาว หากประวัติหลักเกินขอบเขต ให้หั่นส่วนหัวออกเป็นคู่ (User และ Assistant ลบพร้อมกัน)
            while (chatHistory.length > 16) {
                chatHistory.splice(0, 2);
            }

            return {
                answer: aiAnswer,
                modelName: data.model || modelId
            };
        }
    </script>
</body>
</html>
