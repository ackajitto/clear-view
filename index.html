<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Hub - ง่ายสุด</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 20px; 
      background: #0a0a0a; 
      color: #e0e0e0; 
    }
    .container { 
      max-width: 900px; 
      margin: auto; 
    }
    h1 { text-align: center; color: #00ff9d; }
    .controls { 
      background: #1f1f1f; 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 15px; 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      align-items: center;
    }
    select, input[type="text"] { 
      padding: 10px; 
      background: #2a2a2a; 
      color: white; 
      border: none; 
      border-radius: 8px; 
    }
    .messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      background: #1a1a1a; 
      border-radius: 12px; 
      margin-bottom: 15px; 
      min-height: 60vh;
    }
    .message { 
      margin: 12px 0; 
      padding: 14px 18px; 
      border-radius: 12px; 
      max-width: 85%; 
      line-height: 1.5;
    }
    .user { 
      background: #007bff; 
      margin-left: auto; 
      color: white;
    }
    .ai { 
      background: #333; 
    }
    .input-area { 
      display: flex; 
      gap: 10px; 
    }
    input#main-input { 
      flex: 1; 
      padding: 16px; 
      font-size: 16px; 
      background: #222; 
      color: white; 
      border: none; 
      border-radius: 12px; 
    }
    button { 
      padding: 0 25px; 
      background: #00cc77; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-size: 16px;
    }
    button:hover { background: #00ff9d; color: black; }
    .error { color: #ff6666; }
    small { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Free AI Hub</h1>

    <div class="controls">
      <select id="model">
        <option value="groq">Groq - Llama 3.3 (เร็วมาก)</option>
        <option value="gemini" selected>Gemini 2.5 Flash (แนะนำ)</option>
        <option value="openrouter">OpenRouter - Gemini Free</option>
      </select>
      
      <input type="text" id="groq-key" placeholder="Groq API Key" style="width:180px">
      <input type="text" id="gemini-key" placeholder="Gemini API Key" style="width:220px">
      <input type="text" id="openrouter-key" placeholder="OpenRouter API Key" style="width:180px">
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="main-input" placeholder="พิมพ์ข้อความที่นี่... (กด Enter เพื่อส่ง)" 
             onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">ส่ง</button>
    </div>

    <p style="text-align:center; margin-top:15px; font-size:13px;">
      ไป claim Key ที่: 
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Gemini</a> | 
      <a href="https://console.groq.com/keys" target="_blank">Groq</a> | 
      <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>
    </p>
  </div>

  <script>
    // โหลด key จาก localStorage
    function loadKeys() {
      document.getElementById('groq-key').value = localStorage.getItem('groq_key') || '';
      document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
      document.getElementById('openrouter-key').value = localStorage.getItem('openrouter_key') || '';
    }

    function saveKeys() {
      localStorage.setItem('groq_key', document.getElementById('groq-key').value.trim());
      localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
      localStorage.setItem('openrouter_key', document.getElementById('openrouter-key').value.trim());
    }

    loadKeys();

    async function sendMessage() {
      const input = document.getElementById('main-input');
      const messagesDiv = document.getElementById('messages');
      const model = document.getElementById('model').value;

      if (!input.value.trim()) return;

      // แสดงข้อความผู้ใช้
      messagesDiv.innerHTML += `<div class="message user">${input.value}</div>`;
      const userText = input.value;
      input.value = '';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // แสดงกำลังคิด
      const loadingId = 'msg_' + Date.now();
      messagesDiv.innerHTML += `<div class="message ai" id="${loadingId}">กำลังคิด...</div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      let responseText = "เกิดข้อผิดพลาด";

      try {
        if (model === 'groq') {
          responseText = await callGroq(userText);
        } else if (model === 'gemini') {
          responseText = await callGemini(userText);
        } else {
          responseText = await callOpenRouter(userText);
        }
      } catch (e) {
        responseText = "❌ เกิดข้อผิดพลาด: " + e.message;
      }

      document.getElementById(loadingId).innerHTML = responseText;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      saveKeys(); // บันทึก key ทุกครั้งที่ใช้
    }

    // ====================== Groq ======================
    async function callGroq(text) {
      let key = document.getElementById('groq-key').value.trim();
      if (!key) key = prompt("ใส่ Groq API Key:");

      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: "llama3-70b-8192",
          messages: [{ role: "user", content: text }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content;
    }

    // ====================== Gemini (แก้ไขแล้ว) ======================
    async function callGemini(text) {
      let key = document.getElementById('gemini-key').value.trim();
      if (!key) key = prompt("ใส่ Gemini API Key:");

      if (!key) return "❌ ยังไม่ได้ใส่ Gemini API Key";

      const modelName = "gemini-2.5-flash";   // โมเดลฟรีที่เสถียร

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }],
            generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
          })
        }
      );

      const data = await res.json();

      if (!res.ok) {
        return `❌ Gemini Error: ${data.error?.message || 'Unknown error'}`;
      }

      if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
        return "❌ Gemini ไม่มีคำตอบ (อาจถูก Safety Filter หรือ quota หมด)";
      }

      return data.candidates[0].content.parts[0].text;
    }

    // ====================== OpenRouter ======================
    async function callOpenRouter(text) {
      let key = document.getElementById('openrouter-key').value.trim();
      if (!key) key = prompt("ใส่ OpenRouter API Key:");

      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href
        },
        body: JSON.stringify({
          model: "google/gemini-2.5-flash:free",
          messages: [{ role: "user", content: text }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content;
    }
  </script>
</body>
</html>
