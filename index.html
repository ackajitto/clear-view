<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClearView - Professional PDF Experience</title>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts: Anuphan (Modern Thai Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #84cc16;
            --bg: #f8fafc;
            --header-bg: rgba(15, 23, 42, 0.9);
            --line-color: #06C755;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth; /* ทำให้เลื่อนหน้าแบบนุ่มนวล */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Anuphan', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between; /* จัดวางโลโก้ซ้าย และปุ่มแชร์ขวา */
            padding: 0 15px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .logo {
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.2rem;
            text-align: left; /* ขยับโลโก้มาชิดซ้าย */
        }

        .logo span {
            color: var(--accent);
        }

        /* ปุ่มแชร์ไป Line */
        .line-share-btn {
            background-color: var(--line-color);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            transition: opacity 0.2s;
            width: fit-content;
        }

        .line-share-btn:active {
            opacity: 0.8;
        }

        .line-icon {
            width: 16px;
            height: 16px;
            fill: white;
        }

        #pdf-viewer {
            padding-top: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* เลเยอร์สำหรับตรวจจับการแตะเพื่อไปหน้าถัดไป */
        .tap-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
        }

        .save-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none; 
            z-index: 10;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(132, 204, 22, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .page-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px; /* ย้ายจาก right: 20px มาเป็น left: 20px แทน */
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            pointer-events: none;
        }

        /* ปุ่มเลื่อนไปบนสุด (Back to Top) */
        #back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(132, 204, 22, 0.4);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }

        #back-to-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #back-to-top:hover {
            background-color: #6da312;
            transform: scale(1.1);
        }

        #back-to-top:active {
            transform: scale(0.9);
        }

        #back-to-top svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
            background-color: white;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CLEAR<span>VIEW</span></div>
    <a id="line-share" href="#" class="line-share-btn" target="_blank">
        <svg class="line-icon" viewBox="0 0 24 24">
            <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738s-12 4.369-12 9.738c0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.121.303.079.778.039 1.085l-.171 1.027c-.052.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-3.893 2.572-5.992zM6.825 14.101h-2.39c-.36 0-.653-.293-.653-.652v-5.201c0-.361.293-.653.653-.653h.654c.359 0 .653.292.653.653v4.547h1.083c.36 0 .653.293.653.654v.001c0 .358-.293.651-.653.651zm2.344 0h-.654c-.361 0-.653-.293-.653-.652v-5.201c0-.361.292-.653.653-.653h.654c.36 0 .653.292.653.653v5.201c0 .359-.293.652-.653.652zm6.208 0h-2.39c-.36 0-.653-.293-.653-.652v-5.201c0-.361.293-.653.653-.653h.654c.359 0 .652.292.652.653v3.13l2.203-3.129c.148-.211.332-.358.604-.358h.749c.5 0 .762.531.422.898l-1.848 1.996 1.962 3.122c.285.454-.047 1.012-.574 1.012h-.809c-.279 0-.488-.137-.629-.362l-1.047-1.666v1.378c0 .359-.293.652-.653.652zm4.316-1.12c0 .36-.293.652-.653.652h-2.391c-.36 0-.653-.293-.653-.652v-5.201c0-.361.293-.653.653-.653h2.391c.36 0 .653.292.653.653v.001c0 .36-.293.653-.653.653h-1.738v1.173h1.738c.36 0 .653.293.653.654v.001c0 .358-.293.651-.653.651h-1.738v1.173h1.738c.36 0 .653.293.653.654v.001z"/>
        </svg>
        LINE
    </a>
</header>

<div id="loader">
    <div class="spinner"></div>
    <div style="color: var(--primary); font-size: 14px;">กำลังโหลดเอกสาร...</div>
</div>

<div id="pdf-viewer"></div>

<div class="page-indicator" id="page-indicator">หน้า 1 / -</div>

<!-- ปุ่มน่ารักๆ สำหรับกลับไปด้านบน -->
<button id="back-to-top" title="กลับไปด้านบน">
    <svg viewBox="0 0 24 24">
        <path d="M18 15l-6-6-6 6" />
    </svg>
</button>

<footer>
    <div class="copyright">
        © 2026 ClearView. All rights reserved.
    </div>
</footer>

<script>
    const url = 'pdfs/01.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const viewer = document.getElementById('pdf-viewer');
    const loader = document.getElementById('loader');
    const pageIndicator = document.getElementById('page-indicator');
    const lineBtn = document.getElementById('line-share');
    const backToTopBtn = document.getElementById('back-to-top');

    let pdfDoc = null;
    let totalPages = 0;

    // ตั้งค่าลิงก์แชร์ไป Line
    function setupLineShare() {
        const currentUrl = window.location.href;
        const lineShareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(currentUrl)}`;
        lineBtn.href = lineShareUrl;
    }

    async function loadPDF() {
        try {
            setupLineShare();
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            totalPages = pdfDoc.numPages;
            loader.style.display = 'none';
            pageIndicator.innerText = `หน้า 1 / ${totalPages}`;

            const dpr = window.devicePixelRatio || 1;

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                
                const container = document.createElement('div');
                container.className = 'page-container';
                container.id = 'page-' + pageNum;
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                const baseScale = 2.5;
                const viewport = page.getViewport({ scale: baseScale });

                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                context.scale(dpr, dpr);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                container.appendChild(canvas);

                // สร้าง Tap Zone สำหรับคลิกเพื่อไปหน้าถัดไปเท่านั้น
                const tapZone = document.createElement('div');
                tapZone.className = 'tap-zone';
                tapZone.onclick = (e) => {
                    e.stopPropagation();
                    // ถ้ายังไม่ใช่หน้าสุดท้าย ให้เลื่อนไปหน้าถัดไป
                    if (pageNum < totalPages) {
                        scrollToPage(pageNum + 1);
                    }
                };
                container.appendChild(tapZone);

                // ภาพสำหรับเซฟ
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.className = 'save-layer';
                container.appendChild(img);

                viewer.appendChild(container);
            }
        } catch (error) {
            loader.innerHTML = `<div style="color:red; padding: 20px;">⚠️ ไม่สามารถโหลดไฟล์ได้</div>`;
        }
    }

    function scrollToPage(targetPage) {
        const targetElement = document.getElementById('page-' + targetPage);
        if (targetElement) {
            const offset = 70; // เผื่อระยะ header
            const elementPosition = targetElement.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - offset;

            window.scrollTo({
                top: offsetPosition,
                behavior: 'smooth'
            });
        }
    }

    // ฟังก์ชันเลื่อนกลับไปด้านบนสุด
    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });

    window.addEventListener('scroll', () => {
        // แสดงหรือซ่อนปุ่ม Back to Top
        if (window.pageYOffset > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }

        const containers = document.querySelectorAll('.page-container');
        let currentPage = 1;
        
        containers.forEach(container => {
            const rect = container.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                currentPage = container.id.split('-')[1];
            }
        });
        
        if (pdfDoc) {
            pageIndicator.innerText = `หน้า ${currentPage} / ${totalPages}`;
        }
    });

    loadPDF();
</script>

</body>
</html>
