<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Free AI Hub (Multi-Model Pro)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0e0e10; color: #e4e4e7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Container หลักครอบทั้งจอ */
        .container { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* ส่วนควบคุมด้านบน (Header Panel) */
        .header-panel { background: #18181b; padding: 12px 16px; border-bottom: 1px solid #27272a; }
        h1 { text-align: center; color: #00ff99; font-size: 18px; margin: 0 0 10px 0; font-weight: 700; }
        
        .control-row { display: flex; flex-direction: column; gap: 8px; }
        .select-wrapper { width: 100%; }
        select, input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #27272a; background: #27272a; color: white; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: #00cc77; }
        
        .key-group { display: flex; gap: 8px; width: 100%; }
        .key-group input { flex-grow: 1; }
        
        /* ปุ่มกดสไตล์มินิมอล */
        button { padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-check { background: #00cc77; color: white; }
        .btn-check:hover { background: #00ff88; }
        .btn-clear { background: #ef4444; color: white; }
        .btn-clear:hover { background: #f87171; }

        #current-model { font-size: 12px; color: #a1a1aa; display: block; margin-top: 4px; text-align: center; }

        /* พื้นที่แสดงข้อความแชท */
        .messages { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #0e0e10; padding-bottom: 90px; }
        
        /* กล่องข้อความสไตล์โมเดิร์นแอปแชท */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #18181b; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #27272a; }
        
        /* Tags & Buttons ภายในฝั่ง AI */
        .model-tag { font-size: 11px; color: #00ff99; background: #09090b; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; font-weight: bold; border: 1px solid #27272a; }
        .copy-btn { background: #27272a; padding: 4px 8px; font-size: 11px; color: #00ff99; border-radius: 4px; cursor: pointer; float: right; border: 1px solid #3f3f46; margin-bottom: 6px; }
        
        /* ตกแต่งบล็อกโค้ดไม่ให้ล้นหน้าจอมือถือ */
        .ai pre { background: #09090b !important; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid #27272a; }
        .ai code { font-family: monospace; font-size: 13px; padding: 2px 4px; background: #27272a; border-radius: 4px; color: #f43f5e; }
        .ai pre code { padding: 0; background: transparent; color: inherit; display: block; }
        .ai p { margin: 4px 0; }
        .ai table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; overflow-x: auto; display: block; }
        .ai th, .ai td { border: 1px solid #27272a; padding: 6px; text-align: left; }
        .ai th { background: #27272a; color: #00ff99; }

        /* แถบพิมพ์ข้อความด้านล่างสุด ตรึงไว้ถาวร (Sticky Footer) */
        .input-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #18181b; padding: 12px 16px; border-top: 1px solid #27272a; display: flex; gap: 8px; align-items: center; }
        .input-panel input { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; padding: 12px; }
        .input-panel button { background: #00cc77; color: white; padding: 12px 20px; }

        /* ปรับแต่งการแสดงผลเมื่อเข้าสู่หน้าจอมือถือขนาดเล็ก */
        @media (min-width: 600px) {
            .control-row { flex-direction: row; align-items: center; }
            .select-wrapper { width: 45%; }
            .key-group { width: 55%; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-panel">
            <h1>🤖 Safe Free AI Hub</h1>
            <div class="control-row">
                <div class="select-wrapper">
                    <select id="model">
                        <option value="openrouter/free">🚀 Auto Free (แนะนำ - ระบบสลับตัวฟรีให้อัตโนมัติ)</option>
                        <option value="google/gemini-2.5-flash:free">✨ Gemini 2.5 Flash Free (ฉลาด ตอบไว)</option>
                        <option value="openai/gpt-4o-mini:free">🟢 GPT-4o Mini Free (เสถียร คุยสนุก)</option>
                        <option value="meta-llama/llama-3.2-3b-instruct:free">🦙 Llama 3.2 Free (รุ่นทางเลือก)</option>
                    </select>
                </div>
                <div class="key-group">
                    <input id="key" type="password" placeholder="OpenRouter API Key">
                    <button onclick="checkKey()" class="btn-check">🔍 จำ Key</button>
                    <button onclick="clearMemory()" class="btn-clear">🧹 ล้างแชท</button>
                </div>
            </div>
            <span id="current-model"></span>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-panel">
            <input id="text" placeholder="พิมพ์ข้อความคุยกับ AI..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ส่ง</button>
        </div>
    </div>

    <script>
        marked.setOptions({
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        const keyInput = document.getElementById("key");
        keyInput.value = localStorage.getItem("or_key") || "";

        let chatHistory = [];

        function saveKey() {
            localStorage.setItem("or_key", keyInput.value.trim());
        }

        function updateCurrentModel() {
            const modelSelect = document.getElementById("model");
            const display = document.getElementById("current-model");
            let name = modelSelect.options[modelSelect.selectedIndex].text;
            display.textContent = "ระบบกำลังสแตนด์บายที่: " + name;
        }
        document.getElementById("model").addEventListener("change", updateCurrentModel);
        updateCurrentModel();

        function clearMemory() {
            chatHistory = [];
            document.getElementById("messages").innerHTML = "";
            alert("ล้างความจำการคุยเรียบร้อยแล้ว!");
        }

        async function checkKey() {
            saveKey();
            let key = keyInput.value.trim();
            if (!key) return alert("กรุณาใส่ Key ก่อนครับ");
            alert("บันทึก API Key ลงเครื่องสำเร็จ!");
        }

        async function send() {
            let text = document.getElementById("text").value.trim();
            if (!text) return;

            const box = document.getElementById("messages");
            box.innerHTML += `<div class="msg user">${text}</div>`;
            document.getElementById("text").value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.innerHTML = "กำลังประมวลผล...";
            box.appendChild(loading);
            box.scrollTop = box.scrollHeight;

            try {
                const result = await callAIWithFallback(text);
                let htmlResponse = `<button class="copy-btn">📋 ก๊อปปี้โค้ด</button>`;
                htmlResponse += `<div class="model-tag">🤖 ${result.modelName}</div><br>`;
                htmlResponse += `<div class="markdown-body">${marked.parse(result.answer)}</div>`;
                
                loading.innerHTML = htmlResponse;
                loading.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                setupGlobalCopy(loading, result.answer);
            } catch (e) {
                loading.innerHTML = "❌ " + e.message;
            }
            box.scrollTop = box.scrollHeight;
        }

        function setupGlobalCopy(element, rawText) {
            const btn = element.querySelector('.copy-btn');
            if (!btn) return;
            btn.onclick = () => {
                navigator.clipboard.writeText(rawText);
                btn.textContent = "✅ ก๊อปปี้แล้ว!";
                setTimeout(() => btn.textContent = "📋 ก๊อปปี้โค้ด", 2000);
            };
        }

        async function callAIWithFallback(text) {
            const selectedModel = document.getElementById("model").value;
            try {
                return await fetchFromOpenRouter(text, selectedModel);
            } catch (error) {
                console.warn(`โมเดล ${selectedModel} มีปัญหา: ${error.message} -> สลับไปใช้ Auto Free...`);
                // ถ้ารุ่นระบุเจาะจงพัง ให้ถอยกลับไปตายรังที่ออโต้ฟรีเพื่อความชัวร์
                if (selectedModel !== "openrouter/free") {
                    return await fetchFromOpenRouter(text, "openrouter/free");
                } else {
                    throw error;
                }
            }
        }

        async function fetchFromOpenRouter(text, modelId) {
            let key = keyInput.value.trim();
            saveKey();
            if (!key) throw new Error("ยังไม่ได้ใส่ OpenRouter API Key");

            if (modelId !== "openrouter/free" && !modelId.endsWith(":free") && !modelId.includes(":free-")) {
                throw new Error("ระบบบล็อกเพื่อความปลอดภัย (ไม่ใช่โมเดลฟรี)");
            }

            let tempHistory = [...chatHistory, { role: "user", content: text }];
            while (tempHistory.length > 16) { tempHistory.shift(); }

            let body = {
                model: modelId,
                temperature: 0.7,
                messages: [
                    { role: "system", content: "คุณคือผู้ช่วยภาษาไทยที่เป็นมิตร ฉลาด เป็นธรรมชาติ ตอบตรงประเด็น" },
                    ...tempHistory
                ]
            };

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            let aiAnswer = data.choices[0].message.content;
            
            chatHistory.push({ role: "user", content: text });
            chatHistory.push({ role: "assistant", content: aiAnswer });
            
            while (chatHistory.length > 16) { chatHistory.splice(0, 2); }

            return { answer: aiAnswer, modelName: data.model || modelId };
        }
    </script>
</body>
</html>
