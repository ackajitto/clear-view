<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClearView AI - Smart PDF Experience</title>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts: Anuphan -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #84cc16;
            --bg: #f8fafc;
            --header-bg: rgba(15, 23, 42, 0.95);
            --ai-color: #7c3aed;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Anuphan', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .logo { color: white; font-weight: 700; font-size: 1.1rem; }
        .logo span { color: var(--accent); }

        #pdf-viewer {
            margin-top: 75px;
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; padding: 0 8px 120px 8px;
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            overflow: hidden;
            width: 100%; max-width: 900px;
        }

        canvas { display: block; width: 100% !important; height: auto !important; }

        .save-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 10;
        }

        /* AI Action Bar */
        .ai-controls {
            display: flex; gap: 8px; padding: 12px;
            background: #f1f5f9; border-top: 1px solid #e2e8f0;
            justify-content: center;
        }

        .ai-btn {
            background: white; border: 1px solid #cbd5e1;
            padding: 8px 12px; border-radius: 20px;
            font-size: 13px; font-family: 'Anuphan';
            cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: all 0.2s;
        }

        .ai-btn:hover { background: var(--ai-color); color: white; border-color: var(--ai-color); }

        /* Floating Indicator */
        .page-indicator {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.85); color: white;
            padding: 8px 16px; border-radius: 30px;
            font-size: 13px; z-index: 999;
        }

        /* Modal AI */
        #ai-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 2000;
            align-items: center; justify-content: center; padding: 20px;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px;
            border-radius: 20px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-height: 80vh; overflow-y: auto;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        #ai-response { line-height: 1.6; font-size: 15px; white-space: pre-wrap; }

        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 2000;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(132, 204, 22, 0.1);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo">CLEAR<span>VIEW</span> AI</div>
</header>

<div id="loader">
    <div class="spinner"></div>
    <div style="font-size: 14px;">กำลังโหลดเอกสาร...</div>
</div>

<div id="pdf-viewer"></div>

<div class="page-indicator" id="page-indicator">หน้า 1 / -</div>

<!-- AI Modal -->
<div id="ai-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 style="margin:0; color: var(--ai-color);">✨ ผู้ช่วยอัจฉริยะ Gemini</h3>
            <button onclick="closeModal()" style="border:none; background:none; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="ai-response">กำลังประมวลผลด้วย AI...</div>
    </div>
</div>

<script>
    const apiKey = ""; // Environment provides this
    const url = 'pdfs/01.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const viewer = document.getElementById('pdf-viewer');
    const loader = document.getElementById('loader');
    const pageIndicator = document.getElementById('page-indicator');
    const aiModal = document.getElementById('ai-modal');
    const aiResponse = document.getElementById('ai-response');

    let pdfDoc = null;

    async function loadPDF() {
        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            loader.style.display = 'none';
            pageIndicator.innerText = `หน้า 1 / ${pdfDoc.numPages}`;

            const dpr = window.devicePixelRatio || 1;

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const container = document.createElement('div');
                container.className = 'page-container';
                container.id = 'page-' + pageNum;
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const baseScale = 1.5;
                const viewport = page.getViewport({ scale: baseScale });

                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                context.scale(dpr, dpr);

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Add AI Controls for this page
                const controls = document.createElement('div');
                controls.className = 'ai-controls';
                controls.innerHTML = `
                    <button class="ai-btn" onclick="analyzePage(${pageNum}, 'summarize')">✨ สรุปหน้านี้</button>
                    <button class="ai-btn" onclick="analyzePage(${pageNum}, 'explain')">✨ อธิบายรูปภาพ</button>
                `;

                // Add Save Image Layer
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.className = 'save-layer';
                
                container.appendChild(canvas);
                container.appendChild(img);
                container.appendChild(controls);
                viewer.appendChild(container);
            }
        } catch (error) {
            loader.innerHTML = `⚠️ ไม่พบไฟล์ PDF ใน pdfs/01.pdf`;
        }
    }

    async function analyzePage(pageNum, mode) {
        aiModal.style.display = 'flex';
        aiResponse.innerText = "กำลังวิเคราะห์หน้า " + pageNum + " กรุณารอสักครู่...";
        
        const canvas = document.querySelector(`#page-${pageNum} canvas`);
        const base64Image = canvas.toDataURL('image/png').split(',')[1];
        
        let prompt = "";
        if(mode === 'summarize') prompt = "สรุปเนื้อหาสำคัญจากหน้าเอกสารนี้เป็นข้อๆ ให้เข้าใจง่ายที่สุดในภาษาไทย";
        else prompt = "ช่วยอธิบายรูปภาพหรือแผนผังในหน้านี้อย่างละเอียดในภาษาไทย ว่ามีรายละเอียดอะไรที่สำคัญบ้าง";

        try {
            const result = await callGeminiVision(prompt, base64Image);
            aiResponse.innerText = result;
        } catch (e) {
            aiResponse.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI กรุณาลองใหม่อีกครั้ง";
        }
    }

    async function callGeminiVision(prompt, base64Data) {
        let retries = 0;
        const maxRetries = 5;
        
        while (retries < maxRetries) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Data } }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                retries++;
                const delay = Math.pow(2, retries) * 1000;
                await new Promise(res => setTimeout(res, delay));
            }
        }
        throw new Error("Failed after retries");
    }

    function closeModal() { aiModal.style.display = 'none'; }

    window.addEventListener('scroll', () => {
        const containers = document.querySelectorAll('.page-container');
        containers.forEach(container => {
            const rect = container.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                const pNum = container.id.split('-')[1];
                if (pdfDoc) pageIndicator.innerText = `หน้า ${pNum} / ${pdfDoc.numPages}`;
            }
        });
    });

    loadPDF();
</script>

</body>
</html>
