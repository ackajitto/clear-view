<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Free AI Hub (เวอร์ชันชัวร์ 100%)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: white; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        h1 { text-align: center; color: #00ff99; }
        .panel { background: #1d1d1d; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        select, input, button { padding: 12px; border-radius: 10px; border: none; margin: 5px; }
        input, select { background: #333; color: white; }
        button { background: #00cc77; color: white; cursor: pointer; }
        button:hover { background: #00ff88; }
        .messages { background: #151515; min-height: 500px; padding: 20px; border-radius: 15px; overflow: auto; }
        .msg { padding: 14px; margin: 10px 0; border-radius: 12px; line-height: 1.5; }
        .user { background: #0066ff; margin-left: 15%; }
        .ai { background: #333; }
        .model-tag { font-size: 11px; color: #00ff99; background: #222; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 8px; font-weight: bold; border: 1px solid #333; }
        .copy-btn { background: #444; padding: 5px 10px; font-size: 12px; margin-top: 8px; color: white; border-radius: 5px; cursor: pointer; }
        .clear-btn { background: #ff3333; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Safe Free AI Hub (ล็อกเฉพาะสายฟรีชัวร์)</h1>

        <div class="panel">
            <select id="model">
                <option value="openrouter/free">🚀 Auto Free (แนะนำสุด - ระบบสลับตัวที่ดีที่สุดให้ฟรี)</option>
                <option value="meta-llama/llama-3.3-70b-instruct:free">🦙 Llama 3.3 70B Free (ตัวนี้ยังอยู่ในลิสต์ฟรี และแข็งแกร่งมาก)</option>
            </select>
            <span id="current-model" style="margin-left:10px; color:#00ff99;"></span>
            
            <br><br>
            <input id="key" placeholder="OpenRouter API Key" style="width:70%">
            <button onclick="checkKey()">🔍 เช็ก Key</button>
            <button onclick="clearMemory()" class="clear-btn">🧹 ล้างความจำ</button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="panel">
            <input id="text" placeholder="พิมพ์ข้อความคุยกับ AI..." 
                   style="width:75%" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ส่ง</button>
        </div>
    </div>

    <script>
        const keyInput = document.getElementById("key");
        keyInput.value = localStorage.getItem("or_key") || "";

        let chatHistory = [];

        function saveKey() {
            localStorage.setItem("or_key", keyInput.value.trim());
        }

        function updateCurrentModel() {
            const modelSelect = document.getElementById("model");
            const display = document.getElementById("current-model");
            let name = modelSelect.options[modelSelect.selectedIndex].text;
            display.textContent = "กำลังใช้: " + name;
        }
        document.getElementById("model").addEventListener("change", updateCurrentModel);
        updateCurrentModel();

        function clearMemory() {
            chatHistory = [];
            document.getElementById("messages").innerHTML = "";
            alert("ล้างความจำเรียบร้อยแล้ว!");
        }

        async function checkKey() {
            saveKey();
            let key = keyInput.value.trim();
            if (!key) return alert("ใส่ Key ก่อน");
            alert("Key ถูกบันทึกแล้ว");
        }

        async function send() {
            let text = document.getElementById("text").value.trim();
            if (!text) return;

            const box = document.getElementById("messages");
            box.innerHTML += `<div class="msg user">${text}</div>`;
            document.getElementById("text").value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.innerHTML = "กำลังคิด...";
            box.appendChild(loading);
            box.scrollTop = box.scrollHeight;

            try {
                const result = await callAI(text);
                loading.innerHTML = `<div class="model-tag">🤖 Responded by: ${result.modelName}</div><br>${result.answer}`;
                addCopyButtons(loading);   
            } catch (e) {
                loading.innerHTML = "❌ " + e.message;
            }
            box.scrollTop = box.scrollHeight;
        }

        function addCopyButtons(element) {
            const codeBlocks = element.querySelectorAll("pre, code");
            codeBlocks.forEach(block => {
                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.textContent = "📋 ก๊อปปี้โค้ด";
                btn.onclick = () => {
                    navigator.clipboard.writeText(block.textContent);
                    btn.textContent = "✅ ก๊อปแล้ว!";
                    setTimeout(() => btn.textContent = "📋 ก๊อปปี้โค้ด", 2000);
                };
                block.parentNode.insertBefore(btn, block.nextSibling);
            });
        }

        async function callAI(text) {
            let key = keyInput.value.trim();
            saveKey();
            if (!key) throw new Error("ยังไม่ได้ใส่ OpenRouter API Key");

            const model = document.getElementById("model").value;
            updateCurrentModel();

            // 🛡️ ระบบล็อกความปลอดภัยตรวจคำสั่ง :free
            if (model !== "openrouter/free" && !model.endsWith(":free") && !model.includes(":free-")) {
                throw new Error("หยุด! โมเดลนี้ไม่ใช่เวอร์ชันฟรี ระบบบล็อกเพื่อความปลอดภัย");
            }

            chatHistory.push({ role: "user", content: text });
            if (chatHistory.length > 15) chatHistory.shift();

            let body = {
                model: model,
                temperature: 0.75,
                messages: [
                    { 
                        role: "system", 
                        content: "คุณคือผู้ช่วยภาษาไทยที่เป็นมิตร ฉลาด เป็นธรรมชาติ ไม่สุภาพเกินไป ตอบตรงประเด็นและมีประโยชน์" 
                    },
                    ...chatHistory
                ]
            };

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            let aiAnswer = data.choices[0].message.content;

            chatHistory.push({ role: "assistant", content: aiAnswer });
            let realModelName = data.model || model; 

            return {
                answer: aiAnswer,
                modelName: realModelName
            };
        }
    </script>
</body>
</html>
