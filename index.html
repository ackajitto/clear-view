<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Free AI Hub (File System & Hybrid Engine)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0e0e10; color: #e4e4e7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Container หลักครอบทั้งจอ */
        .container { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* ส่วนควบคุมด้านบน (Header Panel) */
        .header-panel { background: #18181b; padding: 12px 16px; border-bottom: 1px solid #27272a; }
        h1 { text-align: center; color: #00ff99; font-size: 18px; margin: 0 0 10px 0; font-weight: 700; }
        
        .control-row { display: flex; flex-direction: column; gap: 8px; }
        .select-wrapper { width: 100%; }
        select, input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #27272a; background: #27272a; color: white; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: #00cc77; }
        
        .key-group { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; }
        .key-group input { flex-grow: 1; min-width: 150px; }
        
        /* ปุ่มกดสไตล์มินิมอล */
        button { padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-check { background: #00cc77; color: white; }
        .btn-check:hover { background: #00ff88; }
        .btn-clear { background: #ef4444; color: white; }
        .btn-clear:hover { background: #f87171; }
        
        /* ปุ่มหมวดหมู่จัดการไฟล์แชท */
        .btn-save { background: #3b82f6; color: white; }
        .btn-save:hover { background: #60a5fa; }
        .btn-upload { background: #a855f7; color: white; }
        .btn-upload:hover { background: #c084fc; }
        
        /* ปุ่มจัดการโฟลเดอร์ในคอมพิวเตอร์ */
        .btn-folder { background: #eab308; color: #0f172a; }
        .btn-folder:hover { background: #fde047; }

        #current-model { font-size: 12px; color: #a1a1aa; display: block; margin-top: 4px; text-align: center; }
        #folder-status { font-size: 12px; color: #eab308; display: block; text-align: center; margin-top: 2px; font-weight: 500; }

        /* พื้นที่แสดงข้อความแชท */
        .messages { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #0e0e10; padding-bottom: 90px; }
        
        /* กล่องข้อความสไตล์โมเดิร์นแอปแชท */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #18181b; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #27272a; position: relative; }
        
        /* ปุ่มรีคำถามแบบ Inline ใต้กล่องข้อความผู้ใช้ล่าสุด */
        .inline-retry-container { align-self: flex-end; margin-top: -8px; margin-bottom: 4px; }
        .btn-inline-retry { background: #27272a; color: #a1a1aa; padding: 4px 10px; font-size: 11px; border-radius: 6px; border: 1px solid #3f3f46; }
        .btn-inline-retry:hover { background: #3f3f46; color: white; }

        /* Tags & Buttons ภายในฝั่ง AI */
        .model-tag { font-size: 11px; color: #00ff99; background: #09090b; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; font-weight: bold; border: 1px solid #27272a; }
        .copy-btn { background: #27272a; padding: 4px 8px; font-size: 11px; color: #00ff99; border-radius: 4px; cursor: pointer; float: right; border: 1px solid #3f3f46; margin-bottom: 6px; }
        
        /* ตกแต่งบล็อกโค้ดไม่ให้ล้นหน้าจอมือถือ */
        .ai pre { background: #09090b !important; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid #27272a; }
        .ai code { font-family: monospace; font-size: 13px; padding: 2px 4px; background: #27272a; border-radius: 4px; color: #f43f5e; }
        .ai pre code { padding: 0; background: transparent; color: inherit; display: block; }
        .ai p { margin: 4px 0; }
        .ai table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; overflow-x: auto; display: block; }
        .ai th, .ai td { border: 1px solid #27272a; padding: 6px; text-align: left; }
        .ai th { background: #27272a; color: #00ff99; }

        /* แถบพิมพ์ข้อความด้านล่างสุด ตรึงไว้ถาวร (Sticky Footer) */
        .input-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #18181b; padding: 12px 16px; border-top: 1px solid #27272a; display: flex; gap: 8px; align-items: center; }
        .input-panel input { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; padding: 12px; }
        .input-panel button { background: #00cc77; color: white; padding: 12px 20px; }

        /* ปรับแต่งการแสดงผลเมื่อเข้าสู่หน้าจอมือถือขนาดเล็ก */
        @media (min-width: 600px) {
            .control-row { flex-direction: row; align-items: center; }
            .select-wrapper { width: 35%; }
            .key-group { width: 65%; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-panel">
            <h1>🤖 Safe Free AI Hub</h1>
            <div class="control-row">
                <div class="select-wrapper">
                    <select id="model">
                        <option value="gemini-direct">✨ Gemini 2.5 Flash (ต่อตรง Google API - แนะนำลื่นไหลสุด)</option>
                        <option value="openrouter/free">🚀 Auto Free (OpenRouter - ระบบสลับตัวฟรีรวม)</option>
                        <option value="openai/gpt-4o-mini:free">🟢 GPT-4o Mini Free (OpenRouter - ค่าย OpenAI)</option>
                        <option value="meta-llama/llama-3.2-3b-instruct:free">🦙 Llama 3.2 Free (OpenRouter - รุ่นทางเลือก)</option>
                    </select>
                </div>
                <div class="key-group">
                    <input id="key" type="password" placeholder="กรุณากรอก API Key">
                    <button onclick="checkKey()" class="btn-check">🔍 จำ Key</button>
                    <button onclick="selectLocalDirectory()" class="btn-folder">📁 เชื่อมโฟลเดอร์คอม</button>
                    <button onclick="saveChatToFile()" class="btn-save">💾 เซฟแชท</button>
                    <button onclick="triggerUpload()" class="btn-upload">📤 อัปโหลดแชท</button>
                    <input type="file" id="file-uploader" accept=".json" style="display: none;" onchange="loadChatFromFile(event)">
                    <button onclick="clearMemory()" class="btn-clear">🧹 ล้างแชท</button>
                </div>
            </div>
            <span id="current-model"></span>
            <span id="folder-status">📂 สถานะ: ยังไม่ได้เลือกโฟลเดอร์คอมพิวเตอร์</span>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-panel">
            <input id="text" placeholder="พิมพ์ข้อความคุยกับ AI หรือระบุชื่อไฟล์ในโฟลเดอร์เพื่อให้เปิดอ่าน..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ส่ง</button>
        </div>
    </div>

    <script>
        marked.setOptions({
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        const keyInput = document.getElementById("key");
        let chatHistory = []; 
        let geminiHistory = []; 
        let rawAiAnswers = []; 
        let lastUserMessage = ""; // ตัวแปรเก็บคำถามล่าสุดสำหรับระบบรีคำถาม

        // ตัวแปรสำหรับเก็บ Handle ของโฟลเดอร์คอมพิวเตอร์และรายการไฟล์ภายใน
        let dirHandle = null;
        let folderFilesMap = {}; 

        function handleKeyUIRefresh() {
            const selectedModel = document.getElementById("model").value;
            if (selectedModel === "gemini-direct") {
                keyInput.placeholder = "Google Studio API Key (AIZA...)";
                keyInput.value = localStorage.getItem("gemini_direct_key") || "";
            } else {
                keyInput.placeholder = "OpenRouter API Key (sk-or...)";
                keyInput.value = localStorage.getItem("or_key") || "";
            }
        }

        function saveKey() {
            const selectedModel = document.getElementById("model").value;
            const val = keyInput.value.trim();
            if (selectedModel === "gemini-direct") {
                localStorage.setItem("gemini_direct_key", val);
            } else {
                localStorage.setItem("or_key", val);
            }
        }

        function updateCurrentModel() {
            handleKeyUIRefresh();
            const modelSelect = document.getElementById("model");
            const display = document.getElementById("current-model");
            let name = modelSelect.options[modelSelect.selectedIndex].text;
            display.textContent = "ระบบกำลังสแตนด์บายที่: " + name;
        }
        document.getElementById("model").addEventListener("change", updateCurrentModel);
        updateCurrentModel();

        function clearMemory() {
            chatHistory = [];
            geminiHistory = [];
            rawAiAnswers = [];
            lastUserMessage = "";
            dirHandle = null;
            folderFilesMap = {};
            document.getElementById("messages").innerHTML = "";
            document.getElementById("folder-status").textContent = "📂 สถานะ: ยังไม่ได้เลือกโฟลเดอร์คอมพิวเตอร์";
            alert("ล้างความจำการคุยเรียบร้อยแล้ว!");
        }

        async function checkKey() {
            saveKey();
            let key = keyInput.value.trim();
            if (!key) return alert("กรุณาใส่ Key ก่อนครับ");
            alert("บันทึก API Key ของระบบนี้สำเร็จแล้ว!");
        }

        // ================= ฟีเจอร์: เชื่อมต่อและสแกนโฟลเดอร์ในคอมพิวเตอร์ด้วย File System Access API =================
        async function selectLocalDirectory() {
            if (!window.showDirectoryPicker) {
                return alert("เบราว์เซอร์ของคุณไม่รองรับการเข้าถึงระบบโฟลเดอร์ กรุณาใช้งานผ่าน Google Chrome หรือ Microsoft Edge บนคอมพิวเตอร์ครับ");
            }
            try {
                dirHandle = await window.showDirectoryPicker();
                folderFilesMap = {};
                let fileListNames = [];

                // สแกนอ่านรายชื่อไฟล์ทั้งหมดที่อยู่ในระดับโฟลเดอร์หลักแบบตื้น (ไม่รวมโฟลเดอร์ย่อยลึก ๆ เพื่อความรวดเร็ว)
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file') {
                        folderFilesMap[entry.name.toLowerCase()] = entry;
                        fileListNames.push(entry.name);
                    }
                }

                document.getElementById("folder-status").textContent = `📁 เชื่อมต่อโฟลเดอร์: [${dirHandle.name}] เรียบร้อยแล้ว (พบไฟล์ทั้งหมด ${fileListNames.length} ไฟล์)`;
                
                // แจ้งระบบแชทให้รับทราบรายชื่อไฟล์ที่สแกนเจอทันที
                const systemNotice = `ขณะนี้ผู้ใช้ได้เปิดการเชื่อมต่อระบบไฟล์ในโฟลเดอร์คอมพิวเตอร์ชื่อว่า "${dirHandle.name}" และนี่คือรายชื่อไฟล์ทั้งหมดภายในโฟลเดอร์นี้: ${fileListNames.join(', ') || 'ไม่มีไฟล์อยู่ข้างใน'} หากผู้ใช้ต้องการให้อ่านหรือสแกนไฟล์ใด ให้แนะนำได้เลย`;
                injectSystemContext(systemNotice);

                alert(`🎉 เชื่อมต่อโฟลเดอร์ "${dirHandle.name}" สำเร็จ! AI รับทราบรายชื่อไฟล์ทั้งหมดเรียบร้อยแล้วครับ`);
            } catch (err) {
                console.error(err);
                alert("❌ ยกเลิกการเข้าถึงหรือเกิดข้อผิดพลาด: " + err.message);
            }
        }

        // ฟังก์ชันเบื้องหลังสำหรับส่องดูว่าในคำถามแชทมีชื่อไฟล์ที่สแกนไว้อยู่หรือไม่ ถ้ามีจะแอบโหลดเนื้อหาข้อความส่งพ่วงไปให้ AI ทันที
        async function autoDetectAndReadFilesContent(userText) {
            if (!dirHandle || Object.keys(folderFilesMap).length === 0) return "";
            
            let attachedContent = "";
            let lowerText = userText.toLowerCase();

            for (const filename in folderFilesMap) {
                if (lowerText.includes(filename)) {
                    try {
                        const fileHandle = folderFilesMap[filename];
                        const file = await fileHandle.getFile();
                        
                        // อนุญาตให้อ่านเฉพาะไฟล์จำพวกข้อความ/โค้ด เพื่อความปลอดภัยของหน่วยความจำ
                        if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.js') || file.name.endsWith('.html') || file.name.endsWith('.css') || file.name.endsWith('.json') || file.name.endsWith('.md')) {
                            const content = await file.text();
                            attachedContent += `\n\n[เนื้อหาภายในไฟล์คอมพิวเตอร์ชื่อ "${fileHandle.name}"]: \n${content}\n[จบเนื้อหาไฟล์]`;
                        }
                    } catch (e) {
                        console.warn(`ไม่สามารถอ่านเนื้อหาในไฟล์ ${filename} ได้:`, e);
                    }
                }
            }
            return attachedContent;
        }

        function injectSystemContext(noticeText) {
            geminiHistory.push({ role: "user", parts: [{ text: `[System Update]: ${noticeText}` }] });
            geminiHistory.push({ role: "model", parts: [{ text: "รับทราบครับ ผมจดจำรายชื่อโครงสร้างไฟล์ในโฟลเดอร์นี้ไว้แล้ว พร้อมตอบคำถามถัดไปครับ" }] });
            chatHistory.push({ role: "user", content: `[System Update]: ${noticeText}` });
            chatHistory.push({ role: "assistant", content: "รับทราบครับ ผมจดจำรายชื่อโครงสร้างไฟล์ในโฟลเดอร์นี้ไว้แล้ว พร้อมตอบคำถามถัดไปครับ" });
        }

        // ================= ฟีเจอร์: เซฟและอัปโหลดประวัติแชท =================
        function saveChatToFile() {
            const box = document.getElementById("messages");
            if (box.children.length === 0) return alert("ไม่มีข้อความแชทให้บันทึกในขณะนี้ครับ");

            const chatData = {
                uiHtml: box.innerHTML,
                chatHistory: chatHistory,
                geminiHistory: geminiHistory,
                rawAiAnswers: rawAiAnswers,
                lastUserMessage: lastUserMessage,
                savedAt: new Date().toISOString()
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(chatData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            
            const timeStamp = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
            downloadAnchor.setAttribute("download", `ai-chat-history-${timeStamp}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function triggerUpload() {
            document.getElementById("file-uploader").click();
        }

        function loadChatFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (!parsedData.uiHtml || (!parsedData.chatHistory && !parsedData.geminiHistory)) {
                        throw new Error("โครงสร้างไฟล์ไม่ถูกต้องหรือไม่รองรับ");
                    }

                    chatHistory = parsedData.chatHistory || [];
                    geminiHistory = parsedData.geminiHistory || [];
                    rawAiAnswers = parsedData.rawAiAnswers || [];
                    lastUserMessage = parsedData.lastUserMessage || "";
                    
                    const box = document.getElementById("messages");
                    box.innerHTML = parsedData.uiHtml;

                    const aiMessages = box.querySelectorAll('.msg.ai');
                    aiMessages.forEach((loadingElement, index) => {
                        const rawText = rawAiAnswers[index];
                        if (rawText) setupGlobalCopy(loadingElement, rawText);
                    });

                    box.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                    box.scrollTop = box.scrollHeight;

                    alert("🎉 อัปโหลดและเชื่อมต่อประวัติแชทสำเร็จ! คุณสามารถพิมพ์คุยต่อได้ทันที");
                } catch (err) {
                    alert("❌ เกิดข้อผิดพลาด: ไม่สามารถอ่านไฟล์นี้ได้ (" + err.message + ")");
                }
                event.target.value = ""; 
            };
            reader.readAsText(file);
        }

        // ================= ระบบจัดการส่งข้อความและสร้างปุ่ม Inline รีคำถามล่าสุด =================
        function renderInlineRetryButton() {
            const oldButton = document.getElementById("latest-retry-btn");
            if (oldButton) oldButton.remove();

            const box = document.getElementById("messages");
            const btnContainer = document.createElement("div");
            btnContainer.className = "inline-retry-container";
            btnContainer.id = "latest-retry-btn";
            btnContainer.innerHTML = `<button onclick="regenerate()" class="btn-inline-retry">🔄 รีคำถามล่าสุด</button>`;
            box.appendChild(btnContainer);
        }

        async function send() {
            let text = document.getElementById("text").value.trim();
            if (!text) return;

            lastUserMessage = text;

            const box = document.getElementById("messages");
            box.innerHTML += `<div class="msg user">${text}</div>`;
            document.getElementById("text").value = "";

            renderInlineRetryButton();

            // ตรวจจับอัตโนมัติว่าในแชทมีการอ้างอิงชื่อไฟล์คอมพิวเตอร์หรือไม่
            let attachedFileContext = await autoDetectAndReadFilesContent(text);

            await executeAIRequest(text, attachedFileContext);
        }

        async function regenerate() {
            if (!lastUserMessage) return alert("ยังไม่มีคำถามก่อนหน้านี้ให้ส่งซ้ำครับ");

            const box = document.getElementById("messages");
            box.innerHTML += `<div class="msg user" style="border: 1px dashed #00cc77; opacity: 0.8;">🔄 <i>ถามซ้ำคำถามเดิม:</i> ${lastUserMessage}</div>`;
            
            renderInlineRetryButton();

            // ลบประวัติคู่สนทนาล่าสุดที่พังออกก่อนส่งซ้ำ
            const selectedModel = document.getElementById("model").value;
            if (selectedModel === "gemini-direct") {
                if (geminiHistory.length > 0) geminiHistory.pop(); 
                if (geminiHistory.length > 0) geminiHistory.pop(); 
            } else {
                if (chatHistory.length > 0) chatHistory.pop(); 
                if (chatHistory.length > 0) chatHistory.pop(); 
            }

            let attachedFileContext = await autoDetectAndReadFilesContent(lastUserMessage);
            await executeAIRequest(lastUserMessage, attachedFileContext);
        }

        async function executeAIRequest(text, extraContext = "") {
            const box = document.getElementById("messages");
            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.innerHTML = "กำลังประมวลผล...";
            box.appendChild(loading);
            box.scrollTop = box.scrollHeight;

            // ผสมคำถามแชทเข้ากับเนื้อหาไฟล์ในเครื่อง (ถ้าตรวจพบ)
            let finalPromptToSend = text + extraContext;

            try {
                const selectedModel = document.getElementById("model").value;
                let result;

                if (selectedModel === "gemini-direct") {
                    result = await fetchFromGeminiDirect(finalPromptToSend);
                } else {
                    result = await callAIWithFallback(finalPromptToSend);
                }

                rawAiAnswers.push(result.answer);

                let htmlResponse = `<button class="copy-btn">📋 ก๊อปปี้โค้ด</button>`;
                htmlResponse += `<div class="model-tag">🤖 ${result.modelName}</div><br>`;
                htmlResponse += `<div class="markdown-body">${marked.parse(result.answer)}</div>`;
                
                loading.innerHTML = htmlResponse;
                loading.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                setupGlobalCopy(loading, result.answer);
            } catch (e) {
                loading.innerHTML = "❌ " + e.message;
            }
            box.scrollTop = box.scrollHeight;
        }

        function setupGlobalCopy(element, rawText) {
            const btn = element.querySelector('.copy-btn');
            if (!btn) return;
            btn.onclick = () => {
                navigator.clipboard.writeText(rawText);
                btn.textContent = "✅ ก๊อปปี้แล้ว!";
                setTimeout(() => btn.textContent = "📋 ก๊อปปี้โค้ด", 2000);
            };
        }

        // ================= ENGINE 1: OPENROUTER (FALLBACK BACKUP) =================
        async function callAIWithFallback(text) {
            const selectedModel = document.getElementById("model").value;
            try {
                return await fetchFromOpenRouter(text, selectedModel);
            } catch (error) {
                console.warn(`โมเดล ${selectedModel} ของ OpenRouter ติดขัด: ${error.message} -> ถอยไปออโต้ฟรี...`);
                if (selectedModel !== "openrouter/free") {
                    return await fetchFromOpenRouter(text, "openrouter/free");
                } else {
                    throw error;
                }
            }
        }

        async function fetchFromOpenRouter(text, modelId) {
            let key = localStorage.getItem("or_key") || "";
            if (!key) throw new Error("ยังไม่ได้ใส่ OpenRouter API Key (กรุณาเลือกโมเดลอื่นหรือใส่คีย์ก่อนครับ)");

            if (modelId !== "openrouter/free" && !modelId.endsWith(":free") && !modelId.includes(":free-")) {
                throw new Error("ระบบบล็อกเพื่อความปลอดภัย (ไม่ใช่โมเดลฟรี)");
            }

            let tempHistory = [...chatHistory, { role: "user", content: text }];
            while (tempHistory.length > 16) { tempHistory.shift(); }

            let body = {
                model: modelId,
                temperature: 0.7,
                messages: [
                    { role: "system", content: "คุณคือผู้ช่วยภาษาไทยที่เป็นมิตร ฉลาด เป็นธรรมชาติ ตอบตรงประเด็น" },
                    ...tempHistory
                ]
            };

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            let aiAnswer = data.choices[0].message.content;
            
            chatHistory.push({ role: "user", content: text });
            chatHistory.push({ role: "assistant", content: aiAnswer });
            while (chatHistory.length > 16) { chatHistory.splice(0, 2); }

            return { answer: aiAnswer, modelName: data.model || modelId };
        }

        // ================= ENGINE 2: GOOGLE AI STUDIO DIRECT (MAIN ENGINE) =================
        async function fetchFromGeminiDirect(text) {
            let key = localStorage.getItem("gemini_direct_key") || "";
            if (!key) throw new Error("ยังไม่ได้ใส่ Google Gemini API Key ในช่องด้านบนครับ");

            geminiHistory.push({ role: "user", parts: [{ text: text }] });
            while (geminiHistory.length > 16) { geminiHistory.shift(); }

            const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
            
            let body = {
                contents: geminiHistory,
                systemInstruction: {
                    parts: [{ text: "คุณคือผู้ช่วยภาษาไทยที่เป็นมิตร ฉลาด เป็นธรรมชาติ ตอบตรงประเด็น และเขียนอธิบายโค้ดได้อย่างเชี่ยวชาญ" }]
                },
                generationConfig: {
                    temperature: 0.7
                }
            };

            const res = await fetch(targetUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                const errMsg = errData.error ? errData.error.message : `HTTP status ${res.status}`;
                throw new Error(`Google API ตอบกลับผิดพลาด: ${errMsg}`);
            }

            const data = await res.json();
            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("ไม่ได้รับข้อความตอบกลับจากระบบเจมินาย (อาจโดนระบบคัดกรองเนื้อหาปัดตก)");
            }

            let aiAnswer = data.candidates[0].content.parts[0].text;
            geminiHistory.push({ role: "model", parts: [{ text: aiAnswer }] });

            return { answer: aiAnswer, modelName: "google/gemini-2.5-flash (Direct API)" };
        }
    </script>
