<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClearView - Professional PDF Experience</title>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts: Anuphan (Modern Thai Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #84cc16;
            --bg: #f8fafc;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Anuphan', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Header แบบไม่ค้าง (Absolute) - จะเลื่อนหายไปเมื่อ scroll ลง */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .logo {
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        .logo span {
            color: var(--accent);
        }

        /* PDF Viewer Container */
        #pdf-viewer {
            padding-top: 75px; /* เว้นระยะให้ Header ในตอนแรก */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* เลเยอร์สำหรับกดค้างเพื่อบันทึกรูป */
        .save-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
            -webkit-touch-callout: default;
        }

        /* สถานะการโหลด */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(132, 204, 22, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ตัวเลขบอกหน้าแบบลอย */
        .page-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
        }

        /* Footer Section */
        footer {
            padding: 40px 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
            background-color: white;
            width: 100%;
        }

        .copyright {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CLEAR<span>VIEW</span></div>
</header>

<div id="loader">
    <div class="spinner"></div>
    <div style="color: var(--primary); font-size: 14px;">กำลังโหลดเอกสารความละเอียดสูงพิเศษ...</div>
</div>

<div id="pdf-viewer"></div>

<div class="page-indicator" id="page-indicator">หน้า 1 / -</div>

<footer>
    <div class="copyright">
        © 2026 ClearView. All rights reserved.
    </div>
</footer>

<script>
    const url = 'pdfs/01.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const viewer = document.getElementById('pdf-viewer');
    const loader = document.getElementById('loader');
    const pageIndicator = document.getElementById('page-indicator');

    let pdfDoc = null;

    async function loadPDF() {
        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            loader.style.display = 'none';
            pageIndicator.innerText = `หน้า 1 / ${pdfDoc.numPages}`;

            const dpr = window.devicePixelRatio || 1;

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                
                const container = document.createElement('div');
                container.className = 'page-container';
                container.id = 'page-' + pageNum;
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                // เพิ่มความละเอียดการเรนเดอร์เป็น 2.5 เพื่อความชัดสูงสุด
                const baseScale = 2.5;
                const viewport = page.getViewport({ scale: baseScale });

                // ตั้งขนาด canvas ตาม dpr และ scale ที่สูงขึ้น
                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                
                // บังคับการวาดให้ขยายตาม dpr
                context.scale(dpr, dpr);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                container.appendChild(canvas);

                // สร้างภาพสำหรับกดบันทึก (แปลงจาก canvas ที่เรนเดอร์ชัดๆ)
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.className = 'save-layer';
                img.alt = `Page ${pageNum}`;
                container.appendChild(img);

                viewer.appendChild(container);
            }
        } catch (error) {
            loader.innerHTML = `<div style="color:red; padding: 20px;">⚠️ ไม่สามารถโหลดไฟล์ได้<br><small>ตรวจสอบว่าไฟล์อยู่ที่ pdfs/01.pdf</small></div>`;
            console.error(error);
        }
    }

    // ระบบอัปเดตเลขหน้าขณะเลื่อน
    window.addEventListener('scroll', () => {
        const containers = document.querySelectorAll('.page-container');
        let currentPage = 1;
        
        containers.forEach(container => {
            const rect = container.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                currentPage = container.id.split('-')[1];
            }
        });
        
        if (pdfDoc) {
            pageIndicator.innerText = `หน้า ${currentPage} / ${pdfDoc.numPages}`;
        }
    });

    loadPDF();
</script>

</body>
</html>
